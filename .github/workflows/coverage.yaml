name: Coverage check

on:
  pull_request:
    branches: [ v1.*, master, experimental/generator ]
  push:
    branches: [ v1.*, master, experimental/generator ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run generator
        run: ./gradlew :metaminer:runGenerator

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply

      - name: Run unit tests
        run: ./gradlew testAllBackends jacocoTestReport --refresh-dependencies --continue
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: List test results (Debug)
        if: ${{ !cancelled() }}
        run: find . -name "TEST-*.xml"

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/build/test-results/**/*.xml"
          report_type: test_results
          fail_ci_if_error: false
