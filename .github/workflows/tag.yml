name: Tag

on:
  push:
    branches: [ master ]

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.bump-semver.outputs.new_version}}
    steps:
      - uses: actions/checkout@v6

      - name: Get merged pull request
        uses: actions-ecosystem/action-get-merged-pull-request@v1.0.1
        if: ${{ github.event_name == 'push' }}
        id: pr
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release label
        uses: actions-ecosystem/action-release-label@v1
        if: ${{ steps.pr.outputs.labels != null }}
        id: release-label
        with:
          label_prefix: 'release/'
          labels: ${{ steps.pr.outputs.labels }}

      - name: Get latest tag
        uses: actions-ecosystem/action-get-latest-tag@v1
        if: ${{ steps.release-label.outputs.level != null }}
        id: get-latest-tag
        with:
          semver_only: true

      - name: Read Paper version from gradle.properties
        id: paper-version
        run: |
          echo "paper_details<<_EOF_" >> "$GITHUB_OUTPUT"
          ./gradlew printPaperDetails --quiet --console=plain 2>&1 >> "$GITHUB_OUTPUT"
          echo "_EOF_" >> "$GITHUB_OUTPUT"

      - name: Bump version
        uses: actions-ecosystem/action-bump-semver@v1
        if: ${{ steps.release-label.outputs.level != null }}
        id: bump-semver
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: ${{ steps.release-label.outputs.level }}

      - name: Push tag
        uses: actions-ecosystem/action-push-tag@v1
        if: ${{ steps.bump-semver.outputs.new_version != null }}
        with:
          tag: ${{ steps.bump-semver.outputs.new_version }}
          message: |
            ${{ steps.bump-semver.outputs.new_version }}
            Triggered by: PR #${{ steps.pr.outputs.number }}
            Commit: ${{ github.sha }}
            ---
            ${{ steps.paper-version.outputs.paper_details }}
  call-publish-workflow:
    name: Call publish workflow
    uses: SecondLifeGaming/MockMC/.github/workflows/publish.yml@master
    needs: tag
    if: ${{ needs.tag.outputs.version != null }}
    with:
      version: $(echo ${{ needs.tag.outputs.version }} | sed -e 's:v::')
    secrets:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_PASS }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
