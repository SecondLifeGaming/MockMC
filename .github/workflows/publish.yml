name: Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "The version to publish (no v prefix)"
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run generator
        run: ./gradlew :metaminer:runGenerator

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply

      - name: Build with Gradle
        run: ./gradlew build -x test --refresh-dependencies

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache -Pmockmc.version=${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Debug signing config
        run: |
          echo "GPG key length: ${#ORG_GRADLE_PROJECT_signingInMemoryKey}"
          echo "Maven username set: $( [ -n "$ORG_GRADLE_PROJECT_mavenCentralUsername" ] && echo yes || echo NO )"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}

      # Target 2: Ships to Maven Central for public use
      - name: Publish to Maven Central
        run: >
          ./gradlew publishAllPublicationsToMavenRepository --no-configuration-cache
          -Pmockmc.version=${{ inputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASS }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ""

      - name: Create GitHub Release
        run: |
          gh release create v${{ inputs.version }} build/libs/*.jar --title "v${{ inputs.version }}" --notes "Release v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
