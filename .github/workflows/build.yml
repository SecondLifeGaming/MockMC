name: Build

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run generator
        run: ./gradlew :metaminer:runGenerator

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply

      - name: Run unit tests
        run: ./gradlew testAllBackends --refresh-dependencies
